<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استطلاع رغبات البونات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #e8c96a;
    }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 1s ease;
      overflow-x: hidden;
      position: relative;
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* مخفي للمستخدم - أنت فقط تحدد المناسبة من الكود */
    .switcher {
      display: none;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 620px;
      border-radius: 28px;
      padding: 50px 35px 40px;
      text-align: center;
      transition: background 1s ease, box-shadow 1s ease, border-color 1s ease;
      animation: cardIn 0.9s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(40px) scale(.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-glow {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 3px;
      border-radius: 0 0 4px 4px;
      transition: background 1s;
    }

    .corner {
      position: absolute;
      width: 55px;
      height: 55px;
      opacity: .5;
      transition: opacity .5s;
      color: var(--accent);
    }

    .corner svg {
      width: 100%;
      height: 100%;
    }

    .corner.tr {
      top: 12px;
      right: 12px;
    }

    .corner.bl {
      bottom: 12px;
      left: 12px;
      transform: rotate(180deg);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 18px;
      border-radius: 50px;
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 700;
      margin-bottom: 8px;
      transition: background 1s, border 1s, color 1s;
      border: 1px solid transparent;
    }

    .org-name {
      font-family: 'Amiri', serif;
      font-size: 24px;
      font-weight: 700;
      margin-top: 6px;
      transition: color .5s;
    }

    .org-sub {
      font-size: 15px;
      margin-top: 3px;
      opacity: .85;
      transition: color .5s;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 26px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      transition: background 1s;
    }

    .divider::before {
      background: linear-gradient(90deg, transparent, var(--accent));
    }

    .divider::after {
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .div-icon {
      font-size: 18px;
      transition: color 1s;
    }

    .title {
      font-family: 'Amiri', serif;
      font-size: 27px;
      line-height: 1.7;
      margin-bottom: 8px;
      transition: color .5s;
    }

    .title-highlight {
      display: block;
      font-size: 31px;
      transition: color 1s, text-shadow 1s;
    }

    .amount-label {
      font-size: 20px;
      letter-spacing: 0;
      text-transform: uppercase;
      color: #e8e8e8;
      margin: 22px 0 12px;
    }

    .amount-outer {
      display: inline-block;
      position: relative;
    }

    .amount-outer .gem {
      position: absolute;
      font-size: 7px;
      transition: color 1s;
    }

    .gem.tr2 { top: -4px; right: -4px; }
    .gem.bl2 { bottom: -4px; left: -4px; }
    .gem.tl2 { top: -4px; left: -4px; }
    .gem.br2 { bottom: -4px; right: -4px; }

    .amount {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 45px;
      border-radius: 16px;
      border: 1.5px solid transparent;
      font-family: 'Amiri', serif;
      font-size: 29px;
      font-weight: bold;
      transition: all 1s;
    }

    .btn-wrap {
      margin-top: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 55px;
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .5px;
      border: 1px solid transparent;
      transition: all .35s;
    }

    .btn:hover {
      transform: translateY(-4px);
    }

    .btn .b-icon {
      font-size: 18px;
      transition: transform .3s;
    }

    .btn:hover .b-icon {
      transform: translateX(-5px);
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .feat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #aaa;
    }

    .feat .fi {
      font-size: 14px;
    }

    .feat strong {
      color: #ccc;
    }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: #fff;
      letter-spacing: 1px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 18px 28px;
      }

      .title {
        font-size: 22px;
      }

      .title-highlight {
        font-size: 25px;
      }

      .amount {
        font-size: 23px;
        padding: 14px 28px;
      }

      .btn {
        font-size: 16px;
        padding: 14px 35px;
      }
    }
  </style>
</head>

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
      constructor(type, colors) {
        this.type = type;
        this.colors = colors;
        this.reset(true);
      }

      reset(init) {
        this.x = Math.random() * canvas.width;
        this.y = init ? Math.random() * canvas.height : -60;
        this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
        this.opacity = 0;
        this.targetOpacity = 0.4 + Math.random() * 0.5;
        this.size = 4 + Math.random() * 16;
        this.speedY = 0.3 + Math.random() * 0.8;
        this.speedX = (Math.random() - 0.5) * 0.6;
        this.rot = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.04;
        this.phase = Math.random() * Math.PI * 2;
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX + Math.sin(this.phase) * 0.3;
        this.phase += 0.02;
        this.rot += this.rotSpeed;

        if (this.opacity < this.targetOpacity) {
          this.opacity = Math.min(this.opacity + 0.015, this.targetOpacity);
        }

        if (this.y > canvas.height + 80) {
          this.reset(false);
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = this.color;
        ctx.strokeStyle = this.color;

        if (this.type === 'lanterns') this.drawLantern();
        else if (this.type === 'stars') this.drawStar();
        else if (this.type === 'fanous') this.drawFanous();
        else if (this.type === 'books') this.drawBook();
        else if (this.type === 'confetti') this.drawConfetti();
        else if (this.type === 'fireworks') this.drawSparkle();

        ctx.restore();
      }

      drawLantern() {
        const s = this.size;
        ctx.beginPath();
        ctx.ellipse(0, 0, s * .6, s, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      drawStar() {
        const s = this.size * .5;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
          const b = ((i * 4 + 2) * Math.PI / 5) - Math.PI / 2;
          if (i === 0) ctx.moveTo(Math.cos(a) * s, Math.sin(a) * s);
          else ctx.lineTo(Math.cos(a) * s, Math.sin(a) * s);
          ctx.lineTo(Math.cos(b) * (s * .4), Math.sin(b) * (s * .4));
        }
        ctx.closePath();
        ctx.fill();
      }

      drawFanous() {
        const s = this.size * .7;
        ctx.beginPath();
        ctx.moveTo(0, -s * 1.2);
        ctx.lineTo(s * .7, -s * .4);
        ctx.lineTo(s * .5, s * .6);
        ctx.lineTo(-s * .5, s * .6);
        ctx.lineTo(-s * .7, -s * .4);
        ctx.closePath();
        ctx.fill();
      }

      drawBook() {
        const s = this.size * .5;
        ctx.fillRect(-s, -s * .7, s * 2, s * 1.4);
      }

      drawConfetti() {
        const s = this.size * .35;
        ctx.fillRect(-s, -s * .5, s * 2, s);
      }

      drawSparkle() {
        const s = this.size * .5;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = i * Math.PI / 4;
          const r = i % 2 === 0 ? s : s * .4;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
      }
    }

    class StarBg {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.r = Math.random() * 1.5 + .3;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = .02 + Math.random() * .03;
      }

      update() {
        this.phase += this.speed;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = (.1 + Math.sin(this.phase) * .5) * .7;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    let bgStars = Array.from({ length: 100 }, () => new StarBg());
    let fgParticles = [];
    let bgColor1 = '#0a1520';
    let bgColor2 = '#0d1b2a';

    function initParticles(theme) {
      fgParticles = Array.from({ length: 18 }, () => new Particle(theme.particles, theme.particleColors));
    }

    function animate() {
      requestAnimationFrame(animate);

      const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      grad.addColorStop(0, bgColor1);
      grad.addColorStop(1, bgColor2);

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      bgStars.forEach(s => {
        s.update();
        s.draw();
      });

      fgParticles.forEach(p => {
        p.update();
        p.draw();
      });
    }

    function applyTheme(key) {
      const t = THEMES[key];
      if (!t) return;

      bgColor1 = t.bodyBg[0];
      bgColor2 = t.bodyBg[1];

      initParticles(t);

      document.documentElement.style.setProperty('--accent', t.accent);

      const card = document.getElementById('card');
      card.style.background = t.cardBg;
      card.style.boxShadow = `${t.cardShadow}, 0 0 0 1px ${t.cardBorder}`;

      document.getElementById('cardGlow').style.background =
        `linear-gradient(90deg, transparent, ${t.accent}, transparent)`;

      const badge = document.getElementById('badge');
      badge.textContent = t.badge;
      badge.style.background = t.badgeBg;
      badge.style.borderColor = t.badgeBorder;
      badge.style.color = t.badgeColor;

      document.getElementById('orgName').style.color = t.orgNameColor;
      document.getElementById('orgSub').style.color = t.orgSubColor;

      document.getElementById('divIcon').textContent = t.divIcon;
      document.getElementById('divIcon').style.color = t.accent;

      document.getElementById('titleEl').style.color = t.titleColor;
      const hl = document.getElementById('titleHighlight');
      hl.textContent = t.titleHighlight;
      hl.style.color = t.highlightColor;
      hl.style.textShadow = t.highlightShadow;

      const amEl = document.getElementById('amountEl');
      amEl.style.background = t.amountBg;
      amEl.style.borderColor = t.amountBorder;
      amEl.style.color = t.amountColor;

      document.getElementById('amountIcon').textContent = t.amountIcon;

      ['gem1', 'gem2', 'gem3', 'gem4'].forEach(id => {
        document.getElementById(id).style.color = t.gemColor;
      });

      document.querySelectorAll('.corner').forEach(el => {
        el.style.color = t.cornerColor;
      });

      const btn = document.getElementById('btnEl');
      btn.style.background = t.btnBg;
      btn.style.borderColor = t.btnBorder;
      btn.style.boxShadow = t.btnShadow;

      document.getElementById('btnText').textContent = t.btnText;
    }

    /* ===== أنت غيّر السطر ده فقط حسب المناسبة ===== */
    const FIXED_THEME = 'adha';

    /* القيم المتاحة:
       adha
       fitr
       ramadan
       school
       national
       newYear
    */

    applyTheme(FIXED_THEME);
    animate();
  </script>
</body>
